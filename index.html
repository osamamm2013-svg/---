<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>التكنولوجيا الطبية - الصف السادس الأساسي</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Tajawal', 'Cairo', 'sans-serif'],
        },
        colors: {
          'slate-850': '#172033',
        },
        keyframes: {
          dash: {
            '0%': { strokeDashoffset: '400' },
            '100%': { strokeDashoffset: '0' },
          },
          'fade-in': {
            '0%': { opacity: '0', transform: 'translateY(8px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' },
          }
        },
        animation: {
          dash: 'dash 3s linear infinite',
          'fade-in': 'fade-in 0.4s ease-out',
        }
      }
    }
  }
</script>

<style>
  html, body { margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Tajawal', 'Cairo', sans-serif; }
  ::selection { background-color: #14b8a6; color: #fff; }
  @media (max-width: 480px) {
    .text-3xl { font-size: 1.5rem; }
    .text-4xl { font-size: 1.875rem; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
